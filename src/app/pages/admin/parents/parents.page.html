<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/dashboard">
      </ion-back-button>
    </ion-buttons>
    <ion-title>
      Parents
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="container">

    <div class="top-section">
      <ion-button color="success" (click)="openAddParent()">
        <ion-icon slot="start" name="add">
        </ion-icon>
        Add Parent

      </ion-button>
    </div>


    <ion-card *ngFor="let parent of parents">

      <ion-card-header>

        <ion-card-title>
          {{ parent.name }}
        </ion-card-title>

      </ion-card-header>

      <ion-card-content>

        <p>
          Parent ID :
          {{ parent.parentId }}
        </p>

        <p>
          Mobile :
          {{ parent.mobileNumber }}
        </p>

        <p>
          Student :
          {{ parent.studentName }}
        </p>

        <p>
          School :
          {{ parent.schoolName }}
        </p>

        <p>
          Driver :
          {{ parent.driverId }}
        </p>

        <ion-button size="small" color="warning" (click)="openEditParent(parent)">

          Edit

        </ion-button>

        <ion-button size="small" color="danger" (click)="deleteParent(parent)">

          Delete

        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
